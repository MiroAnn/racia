<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>🏔️ Поболтушки</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0d0d1a; --card:#161628; --green:#00d46a; --red:#ff3b30; --blue:#4a9eff; --text:#fff; --muted:#6b7280; }
    html { height: 100%; }
    body {
      height: 100%; min-height: 100vh;
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden; touch-action: none; user-select: none; -webkit-user-select: none;
      /* body сам является flex-контейнером — надёжно на любом браузере */
      display: flex; flex-direction: column;
    }

    /* ── Главный экран ── */
    #app {
      flex: 1;          /* занимает всё оставшееся место */
      width: 100%;      /* на всю ширину body */
      display: flex; flex-direction: column; align-items: center;
      justify-content: space-between;
      padding: 16px 18px 20px;
      padding-bottom: max(20px, env(safe-area-inset-bottom));
      overflow: hidden;
    }

    /* Шапка */
    .hd { display: flex; align-items: center; justify-content: space-between; width: 100%; }
    .hd-left { display: flex; flex-direction: column; gap: 5px; }
    .hd-logo-title { display: flex; align-items: center; gap: 6px; }
    .hd-logo { font-size: 1.2rem; line-height: 1; }
    .hd-title { font-size: .95rem; font-weight: 700; }
    .hd-room { display: flex; align-items: center; gap: 7px; }
    .hd-rlbl { color: var(--muted); font-size: .68rem; text-transform: uppercase; letter-spacing: .08em; }
    .hd-rbadge { background: rgba(74,158,255,.1); border: 1px solid rgba(74,158,255,.24); color: var(--blue); font-size: .75rem; font-weight: 700; letter-spacing: .1em; padding: 2px 10px; border-radius: 20px; cursor: pointer; }
    .hd-chint { font-size: .64rem; color: var(--muted); margin-top: 1px; opacity: 0; transition: opacity .3s; height: .75em; }
    .hd-chint.on { opacity: 1; }

    /* Участники */
    .plist { width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 5px; }
    .pi { display: flex; align-items: center; gap: 10px; background: var(--card); border-radius: 10px; padding: 8px 12px; border: 1.5px solid transparent; transition: border-color .2s, background .2s; min-height: 38px; }
    .pi.speaking { background: rgba(255,59,48,.06); border-color: rgba(255,59,48,.2); }
    .pi.me-row { cursor: pointer; }
    .pi.me-row:active { background: rgba(74,158,255,.08); }
    .pd { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; transition: background .25s, transform .2s, box-shadow .25s; }
    .pd.me { background: var(--green); box-shadow: 0 0 7px rgba(0,212,106,.5); }
    .pd.online { background: var(--blue); box-shadow: 0 0 6px rgba(74,158,255,.4); }
    .pd.speaking { background: var(--red); transform: scale(1.4); box-shadow: 0 0 9px rgba(255,59,48,.6); animation: blink .75s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.35} }
    .pname { font-size: .88rem; font-weight: 600; flex: 1; }
    .ptag { font-size: .66rem; color: var(--muted); white-space: nowrap; }
    .pspk { font-size: .66rem; color: var(--red); white-space: nowrap; }

    /* Инлайн-редактирование имени */
    .pi.editing { border-color: rgba(74,158,255,.35); background: rgba(74,158,255,.06); }
    .pname-input {
      flex: 1; background: transparent; border: none; outline: none;
      color: var(--text); font-size: .88rem; font-weight: 600;
      font-family: inherit; padding: 0; min-width: 0;
      touch-action: auto; user-select: text; -webkit-user-select: text;
    }
    .pname-input::placeholder { color: var(--muted); }
    .save-btn { background: var(--green); border: none; border-radius: 7px; color: #000; font-size: .75rem; font-weight: 700; padding: 4px 9px; cursor: pointer; flex-shrink: 0; }

    .stline { font-size: .76rem; color: var(--muted); text-align: center; margin-top: 3px; }
    .stline.tx { color: var(--red); font-weight: 600; }

    /* TALK */
    .tw { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    #tbtn {
      width: 168px; height: 168px; border-radius: 50%;
      border: none; outline: none; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      background: radial-gradient(circle at 38% 35%, #00e87a, #00a84f);
      box-shadow: 0 0 0 9px rgba(0,212,106,.07),0 0 0 18px rgba(0,212,106,.03),0 9px 30px rgba(0,212,106,.35),inset 0 2px 0 rgba(255,255,255,.18),inset 0 -3px 7px rgba(0,0,0,.25);
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
      transition: transform .08s, box-shadow .08s, background .1s;
    }
    #tbtn:disabled { background: radial-gradient(circle at 38% 35%, #222238, #161628); box-shadow: 0 5px 18px rgba(0,0,0,.4); cursor: not-allowed; }
    #tbtn.pressing { background: radial-gradient(circle at 38% 35%, #ff5f55, #cc2e24); box-shadow: 0 0 0 9px rgba(255,59,48,.1),0 0 0 18px rgba(255,59,48,.04),0 7px 26px rgba(255,59,48,.5),inset 0 2px 0 rgba(255,255,255,.12),inset 0 -3px 7px rgba(0,0,0,.3); transform: scale(.95); }
    .bicon { font-size: 1.9rem; pointer-events: none; }
    .blbl { font-size: .92rem; font-weight: 800; letter-spacing: .18em; color: rgba(255,255,255,.95); pointer-events: none; }

    .thint { color: var(--muted); font-size: .73rem; text-align: center; }

    /* Mute */
    #mbtn { width: 48px; height: 48px; flex-shrink: 0; border-radius: 50%; border: 2px solid #1f1f38; background: var(--card); color: #fff; font-size: 1.3rem; cursor: pointer; outline: none; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; transition: background .2s, border-color .2s; }
    #mbtn.muted { border-color: var(--red); background: rgba(255,59,48,.12); }

    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(60px); background: rgba(255,255,255,.12); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.1); color: #fff; padding: 8px 16px; border-radius: 18px; font-size: .8rem; transition: transform .3s; pointer-events: none; white-space: nowrap; }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Сплэш-экран ── */
    #splash {
      position:fixed; inset:0; z-index:3000;
      background:var(--bg);
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
      cursor:pointer; -webkit-tap-highlight-color:transparent;
      transition:opacity .35s ease;
      user-select:none; -webkit-user-select:none;
    }
    #splash.out { opacity:0; pointer-events:none; }
    .sp-logo { font-size:3rem; line-height:1; }
    .sp-title { font-size:1.5rem; font-weight:800; letter-spacing:.02em; }
    .sp-room-lbl { color:var(--muted); font-size:.68rem; text-transform:uppercase; letter-spacing:.1em; margin-top:8px; }
    .sp-room-badge { background:rgba(74,158,255,.1); border:1px solid rgba(74,158,255,.24); color:var(--blue); font-size:.85rem; font-weight:700; letter-spacing:.1em; padding:3px 14px; border-radius:20px; }
    .sp-btn {
      margin-top:24px; width:148px; height:148px; border-radius:50%; border:none;
      background:radial-gradient(circle at 38% 35%,#4a9eff,#1a6fd4);
      box-shadow:0 0 0 10px rgba(74,158,255,.08),0 8px 32px rgba(74,158,255,.4),inset 0 2px 0 rgba(255,255,255,.2);
      color:#fff; font-size:.95rem; font-weight:800; letter-spacing:.14em;
      display:flex; align-items:center; justify-content:center; flex-direction:column; gap:6px;
      pointer-events:none; transition:transform .08s, box-shadow .08s;
    }
    #splash:active .sp-btn { transform:scale(.93); box-shadow:0 0 0 10px rgba(74,158,255,.12),0 4px 20px rgba(74,158,255,.3),inset 0 2px 0 rgba(255,255,255,.15); }
    .sp-hint { color:var(--muted); font-size:.72rem; margin-top:10px; }

    /* ── Debug panel ── */
    #dbg { display:none; position:fixed; inset:0; background:rgba(0,0,0,.92); z-index:999; flex-direction:column; font-family:monospace; font-size:11px; color:#ccc; }
    #dbg.on { display:flex; }
    #dbg-head { display:flex; justify-content:space-between; align-items:center; padding:10px 14px; border-bottom:1px solid #222; flex-shrink:0; }
    #dbg-head span { color:#fff; font-size:13px; font-weight:700; }
    #dbg-close, #dbg-copy, #dbg-clear { background:none; border:1px solid #444; color:#aaa; border-radius:6px; padding:4px 10px; cursor:pointer; font-size:11px; }
    #dbg-copy:active { background:#1a3a1a; color:#0f0; }
    #dbg-clear:active { background:#3a1a1a; color:#f00; }
    #dbg-body { flex:1; overflow-y:auto; padding:10px 14px; display:flex; flex-direction:column; gap:10px; }
    .dbg-peer { background:#111; border-radius:8px; padding:8px 10px; border-left:3px solid #333; }
    .dbg-peer.ice-connected { border-left-color:#00d46a; }
    .dbg-peer.ice-checking  { border-left-color:#f59e0b; }
    .dbg-peer.ice-failed    { border-left-color:#ff3b30; }
    .dbg-peer.ice-new       { border-left-color:#4a9eff; }
    .dbg-pname { color:#fff; font-weight:700; margin-bottom:4px; }
    .dbg-row   { display:flex; gap:6px; margin-top:2px; }
    .dbg-lbl   { color:#555; min-width:60px; }
    .dbg-val   { color:#aaa; }
    .dbg-val.ok  { color:#00d46a; }
    .dbg-val.bad { color:#ff3b30; }
    .dbg-val.mid { color:#f59e0b; }
    #dbg-log { background:#0a0a14; border-radius:8px; padding:8px 10px; flex:1; overflow-y:auto; min-height:120px; }
    .dbg-entry { padding:2px 0; border-bottom:1px solid #111; }
    .dbg-entry .t { color:#444; margin-right:6px; }
    .dbg-entry .ev { color:#7dd3fc; }
    .dbg-entry .detail { color:#6b7280; }
  </style>
</head>
<body>

<div id="app">
  <div class="hd">
    <div class="hd-left">
      <div class="hd-logo-title">
        <div class="hd-logo">🏔️</div>
        <div class="hd-title">Поболтушки</div>
      </div>
      <div class="hd-room">
        <span class="hd-rlbl">Комната</span>
        <span class="hd-rbadge" id="m-room">—</span>
      </div>
      <div class="hd-chint" id="m-chint">✓ Ссылка скопирована</div>
    </div>
    <button id="mbtn">🔊</button>
  </div>

  <div style="width:100%;max-width:360px;display:flex;flex-direction:column;align-items:center;gap:6px;">
    <div class="plist" id="m-plist"></div>
    <div class="stline" id="m-st">Подключение…</div>
  </div>

  <div class="tw">
    <button id="tbtn" disabled><div class="bicon">🎙️</div><div class="blbl">TALK</div></button>
    <div class="thint" id="m-hint">Удерживай кнопку чтобы говорить</div>
  </div>
</div>

<div id="toast"></div>

<div id="splash">
  <div class="sp-logo">🏔️</div>
  <div class="sp-title">Поболтушки</div>
  <div class="sp-room-lbl">Комната</div>
  <div class="sp-room-badge" id="sp-room">—</div>
  <div class="sp-btn">
    <span style="font-size:1.9rem">🎙️</span>
    <span>ВОЙТИ</span>
  </div>
  <div class="sp-hint">Нажми чтобы войти</div>
</div>

<div id="dbg">
  <div id="dbg-head">
    <span>🔧 Debug</span>
    <div style="display:flex;gap:6px">
      <button id="dbg-copy">Копировать</button>
      <button id="dbg-clear">Сброс</button>
      <button id="dbg-close">Закрыть</button>
    </div>
  </div>
  <div id="dbg-body">
    <div id="dbg-peers"></div>
    <div id="dbg-log"></div>
  </div>
</div>

<script>
// ── Конфиг ───────────────────────────────────────────────────────────────────
const DB = 'https://racia-275ba-default-rtdb.europe-west1.firebasedatabase.app';
const ICE_FALLBACK = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'turn:a.relay.metered.ca:80',
    username:'487b1823f1e0ce14f1f2b901', credential:'ehdRPgYE8003rQWu' },
  { urls: 'turn:a.relay.metered.ca:443?transport=tcp',
    username:'487b1823f1e0ce14f1f2b901', credential:'ehdRPgYE8003rQWu' },
  { urls: 'turns:a.relay.metered.ca:443',
    username:'487b1823f1e0ce14f1f2b901', credential:'ehdRPgYE8003rQWu' },
];
let ICE_SERVERS = ICE_FALLBACK;
async function loadIceServers() {
  try {
    const r = await fetch('https://annmiro.metered.live/api/v1/turn/credentials?apiKey=3441f7c12cc6972242a1364ddba767e06a7c');
    const s = await r.json();
    if (s && s.length) { ICE_SERVERS = s; dbg('TURN-api✓', s.length+' servers'); }
  } catch(e) { dbg('TURN-api-fallback', String(e)); }
}
loadIceServers();

// ── Смешные имена ─────────────────────────────────────────────────────────────
const ADJ  = ['Быстрый','Лихой','Дерзкий','Крутой','Смелый','Дикий','Хитрый','Ловкий','Шустрый','Удалой','Бравый','Лютый','Сонный','Хмурый','Весёлый','Мощный','Пушистый','Звонкий','Ярый','Хрустящий'];
const NOUN = ['Бобёр','Лось','Медведь','Заяц','Волк','Лиса','Бурундук','Сурок','Орёл','Сова','Ёж','Кабан','Рысь','Соболь','Снегирь','Зубр','Барсук','Суслик','Хомяк','Глухарь'];
function funnyName() { return ADJ[Math.random()*ADJ.length|0] + ' ' + NOUN[Math.random()*NOUN.length|0]; }

// ── Утилиты ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function toast(msg) { const el=$('toast'); el.textContent=msg; el.classList.add('show'); setTimeout(()=>el.classList.remove('show'),2200); }

function fbUrl(room,path) { return DB+'/rooms/'+room+'/'+path+'.json'; }
function fbPut(room,path,val) { return fetch(fbUrl(room,path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(val)}); }
function fbDel(room,path)    { return fetch(fbUrl(room,path),{method:'DELETE'}); }
function fbListen(room,path,cb) {
  const isSignals = path.startsWith('signals/');
  let es, reconnTimer;
  function connect() {
    if (es) { try{es.close();}catch(_){} }
    clearTimeout(reconnTimer);
    es = new EventSource(fbUrl(room,path)+'?stream=true');
    es.addEventListener('put', e => {
      const d=JSON.parse(e.data);
      if(path==='users') dbg('SSE-users put', 'path='+d.path+' data='+(d.data?JSON.stringify(d.data).slice(0,60):'null'));
      if(isSignals && d.data) {
        const inner = d.path==='/' ? Object.values(d.data)[0] : d.data;
        dbg('SSE-signal put', 'path='+d.path+' type='+(inner&&inner.type||'?'));
      }
      cb(d.path,d.data);
    });
    es.addEventListener('error', ()=> {
      dbg('SSE-error', path.slice(0,20));
      // Переподключаемся через 2с — не ждём медленный браузерный backoff
      reconnTimer = setTimeout(connect, 2000);
    });
    es.addEventListener('open',  ()=> { dbg('SSE-open',  path.slice(0,20)); });
  }
  connect();
  return { close: ()=>{ clearTimeout(reconnTimer); if(es) es.close(); } };
}

// ── Комната и режим ──────────────────────────────────────────────────────────
const P = new URLSearchParams(window.location.search);
let room = P.get('room');
if (!room) {
  room = Math.random().toString(36).slice(2,8).toUpperCase();
  const u = new URL(location.href); u.searchParams.set('room',room); history.replaceState({},'',u);
}
$('m-room').textContent = room;
$('sp-room').textContent = room;

// Открытый режим: ?open=1 — кнопка-переключатель, не нужно удерживать
const OPEN_MODE = P.get('open') === '1';

// ── Debug — объявляем ДО сплэша, чтобы не было TDZ-ошибки ───────────────────
const DEBUG_MODE = P.get('debug') === '1';
// Загружаем предыдущий лог из sessionStorage (не теряется при обновлении страницы)
let dbgLog = [];
try {
  const saved = sessionStorage.getItem('racia_dbglog');
  if (saved) {
    dbgLog = JSON.parse(saved);
    dbgLog.unshift({sec:'---', event:'PAGE-RELOAD', detail: new Date().toLocaleTimeString()});
  }
} catch(_) {}
const T0 = Date.now();
function dbg(event, detail='') {
  const sec = ((Date.now()-T0)/1000).toFixed(1);
  dbgLog.unshift({sec, event, detail});
  if (dbgLog.length > 120) dbgLog.length = 120;
  try { sessionStorage.setItem('racia_dbglog', JSON.stringify(dbgLog.slice(0,120))); } catch(_) {}
  if ($('dbg').classList.contains('on')) renderDbg();
}

// ── AudioContext на уровне модуля — разблокируется через тап на сплэше ───────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

// Глобальный хук: startApp заполняет его после инициализации
window._tryPlayAll = null;

// ── Сплэш: тап разблокирует AudioContext до прихода любого звука ─────────────
(function initSplash() {
  const splash = $('splash');
  function enterRoom() {
    const ctx = getAudioCtx();
    dbg('splash-enter', 'ctx='+ctx.state);
    ctx.resume().then(() => {
      dbg('ctx-resumed', ctx.state);
      if (window._tryPlayAll) window._tryPlayAll();
    }).catch(()=>{});
    splash.classList.add('out');
    setTimeout(() => { splash.style.display = 'none'; }, 380);
    splash.removeEventListener('click',    enterRoom);
    splash.removeEventListener('touchend', onTouch);
  }
  function onTouch(e) { e.preventDefault(); enterRoom(); }
  // В debug-режиме сплэш пропускается автоматически
  if (DEBUG_MODE) {
    splash.style.display = 'none';
    dbg('splash-auto-skip', 'debug mode');
  } else {
    splash.addEventListener('click',    enterRoom);
    splash.addEventListener('touchend', onTouch);
  }
})();
function iceClass(state) {
  if (state==='connected'||state==='completed') return 'ice-connected';
  if (state==='checking'||state==='new') return 'ice-checking';
  if (state==='failed'||state==='disconnected'||state==='closed') return 'ice-failed';
  return 'ice-new';
}
function valClass(v) {
  if (!v || v==='null' || v==='ended' || v==='failed' || v==='disconnected' || v==='closed' || v==='recvonly' || v==='inactive') return 'bad';
  if (v==='checking'||v==='new'||v==='have-local-offer'||v==='have-remote-offer') return 'mid';
  return 'ok';
}
function renderDbg() {
  const pc_el = $('dbg-peers');
  const peerList = Object.entries(typeof peers!=='undefined'?peers:{});
  pc_el.innerHTML = peerList.length ? '' : '<div style="color:#555;font-size:11px">Нет соединений</div>';
  peerList.forEach(([uid, {pc}]) => {
    const name = (typeof presence!=='undefined'&&presence[uid]) ? presence[uid].name : uid.slice(0,6);
    const ice  = pc.iceConnectionState;
    const conn = pc.connectionState;
    const sig  = pc.signalingState;
    const senders = pc.getSenders();
    const recvs   = pc.getReceivers();
    const sndTrack = senders[0]?.track;
    const rcvTrack = recvs[0]?.track;
    const sndInfo = sndTrack ? `${sndTrack.kind} ${sndTrack.readyState} en=${sndTrack.enabled}` : 'null';
    const rcvInfo = rcvTrack ? `${rcvTrack.kind} ${rcvTrack.readyState}` : 'null';
    const div = document.createElement('div');
    div.className = 'dbg-peer '+iceClass(ice);
    div.innerHTML = `<div class="dbg-pname">${name} <span style="color:#444;font-weight:normal">${uid.slice(0,6)}</span></div>
      <div class="dbg-row"><span class="dbg-lbl">ICE:</span><span class="dbg-val ${valClass(ice)}">${ice}</span></div>
      <div class="dbg-row"><span class="dbg-lbl">conn:</span><span class="dbg-val ${valClass(conn)}">${conn}</span></div>
      <div class="dbg-row"><span class="dbg-lbl">signal:</span><span class="dbg-val ${valClass(sig)}">${sig}</span></div>
      <div class="dbg-row"><span class="dbg-lbl">send:</span><span class="dbg-val ${valClass(sndInfo)}">${sndInfo}</span></div>
      <div class="dbg-row"><span class="dbg-lbl">recv:</span><span class="dbg-val ${valClass(rcvInfo)}">${rcvInfo}</span></div>`;
    pc_el.appendChild(div);
  });
  const log_el = $('dbg-log');
  log_el.innerHTML = dbgLog.map(e=>`<div class="dbg-entry"><span class="t">${e.sec}s</span><span class="ev">${e.event}</span>${e.detail?' <span class="detail">'+e.detail+'</span>':''}</div>`).join('');
}

if (DEBUG_MODE) { $('dbg').classList.add('on'); setInterval(renderDbg, 1000); }
$('dbg-close').addEventListener('click', ()=>$('dbg').classList.remove('on'));
$('dbg-clear').addEventListener('click', ()=>{ dbgLog.length=0; try{sessionStorage.removeItem('racia_dbglog');}catch(_){} renderDbg(); $('dbg-clear').textContent='✓ Сброшен'; setTimeout(()=>{ $('dbg-clear').textContent='Сброс'; },1500); });
$('dbg-copy').addEventListener('click', ()=>{
  const peerLines = Object.entries(typeof peers!=='undefined'?peers:{}).map(([uid,{pc}])=>{
    const s=pc.getSenders(); const r=pc.getReceivers();
    return `  PEER ${uid.slice(0,6)}: ice=${pc.iceConnectionState} conn=${pc.connectionState} sig=${pc.signalingState}`
      +`\n    send=${s.map(snd=>snd.track?snd.track.kind+'/'+snd.track.readyState+'/en='+snd.track.enabled:'null').join(',')}`
      +`\n    recv=${r.map(rcv=>rcv.track?rcv.track.kind+'/'+rcv.track.readyState:'null').join(',')}`;
  }).join('\n');
  const logLines = dbgLog.map(e=>`${e.sec}s ${e.event} ${e.detail}`).join('\n');
  const txt = '=== PEERS ===\n'+(peerLines||'none')+'\n\n=== LOG ===\n'+logLines;
  navigator.clipboard.writeText(txt).then(()=>{ $('dbg-copy').textContent='✓ Скопировано!'; setTimeout(()=>{ $('dbg-copy').textContent='Копировать'; },2000); }).catch(()=>alert(txt));
});
let tapCount=0, tapTimer=0;
document.querySelector('.hd-title').addEventListener('click', ()=>{
  tapCount++; clearTimeout(tapTimer);
  tapTimer = setTimeout(()=>tapCount=0, 800);
  if (tapCount>=5) { tapCount=0; $('dbg').classList.toggle('on'); renderDbg(); setInterval(renderDbg,1000); }
});

function copyLink() {
  navigator.clipboard.writeText(location.href).then(()=>{
    toast('Ссылка скопирована!');
    $('m-chint').classList.add('on');
    setTimeout(()=>$('m-chint').classList.remove('on'),2200);
  });
}
$('m-room').addEventListener('click', copyLink);

// ── Имя из localStorage или генерируем ────────────────────────────────────────
let myName = localStorage.getItem('racia_name') || funnyName();
localStorage.setItem('racia_name', myName);

// ── Старт сразу ─────────────────────────────────────────────────────────────
startApp(myName);

// ════════════════════════════════════════════════════════════════════════════
async function startApp(initialName) {
  const myUid = localStorage.getItem('racia_uid') || Math.random().toString(36).slice(2,10);
  localStorage.setItem('racia_uid', myUid);

  const presence = {}, peers = {};
  let muted=false, talking=false, localStream=null;
  let currentMyName = initialName;
  let isEditing = false;

  const tbtn=$('tbtn'), mbtn=$('mbtn');

  function setStatus(txt, isTx=false) { const el=$('m-st'); el.textContent=txt; el.classList.toggle('tx',isTx); }

  // ── Рендер списка участников ─────────────────────────────────────────────
  function renderList() {
    if (isEditing) return;
    const c=$('m-plist'); c.innerHTML='';
    const sorted = [[myUid, presence[myUid]], ...Object.entries(presence).filter(([uid])=>uid!==myUid)];
    sorted.forEach(([uid, p]) => {
      if (!p || !p.name) return;
      const { name, speaking } = p;
      const isMe = uid === myUid;
      const div = document.createElement('div');
      div.className = 'pi' + (speaking?' speaking':'') + (isMe?' me-row':'');
      const dot = document.createElement('div');
      dot.className = 'pd '+(isMe?'me':speaking?'speaking':'online');
      const nm = document.createElement('div'); nm.className='pname'; nm.textContent=name;
      const tag = document.createElement('div');
      if (isMe) { tag.className='ptag'; tag.textContent='ты ✏️'; }
      else if (speaking) { tag.className='pspk'; tag.textContent='● говорит'; }
      div.append(dot, nm, tag);
      if (isMe) div.addEventListener('click', startEditing);
      c.appendChild(div);
    });
    if (!talking) setStatus('Онлайн: '+Object.keys(presence).length+' чел.');
  }

  // ── Редактирование имени ─────────────────────────────────────────────────
  function startEditing() {
    if (isEditing) return;
    isEditing = true;
    const c = $('m-plist');
    const rows = c.querySelectorAll('.pi');
    const myRow = Array.from(rows).find(r => r.classList.contains('me-row'));
    if (!myRow) return;
    myRow.classList.add('editing');
    myRow.removeEventListener('click', startEditing);
    myRow.innerHTML = '';
    const dot = document.createElement('div'); dot.className='pd me';
    const input = document.createElement('input');
    input.className='pname-input'; input.type='text';
    input.value=currentMyName; input.maxLength=18;
    input.placeholder='Твоё имя';
    input.autocomplete='off'; input.autocorrect='off'; input.spellcheck=false;
    const btn = document.createElement('button'); btn.className='save-btn'; btn.textContent='Готово';
    const save = () => {
      const newName = input.value.trim();
      if (newName && newName !== currentMyName) {
        currentMyName = newName; myName = newName;
        localStorage.setItem('racia_name', newName);
        if (presence[myUid]) presence[myUid].name = newName;
        fbPut(room,'users/'+myUid+'/name', newName);
      }
      isEditing = false; renderList();
    };
    btn.addEventListener('click', save);
    input.addEventListener('keydown', e => { if(e.key==='Enter'){input.blur();} if(e.key==='Escape'){isEditing=false;renderList();} });
    input.addEventListener('blur', () => setTimeout(save, 200));
    myRow.append(dot, input, btn);
    setTimeout(() => { input.focus(); input.select(); }, 50);
  }

  // ── Кнопка разблокировки звука (появляется если play() заблокирован браузером) ──
  let unlockBtnShown = false;
  function showAudioUnlock() {
    if (unlockBtnShown || document.getElementById('audio-unlock')) return;
    unlockBtnShown = true;
    const btn = document.createElement('div');
    btn.id = 'audio-unlock';
    btn.innerHTML = '🔊';
    btn.title = 'Нажми чтобы включить звук';
    btn.style.cssText = [
      'position:fixed','bottom:108px','left:50%','transform:translateX(-50%)',
      'z-index:4000','background:#ff3b30','color:#fff','font-size:1.6rem',
      'width:60px','height:60px','border-radius:50%',
      'display:flex','align-items:center','justify-content:center',
      'cursor:pointer','box-shadow:0 4px 18px rgba(255,59,48,.55)',
      'animation:unlockPulse 1.1s ease-in-out infinite',
    ].join(';');
    if (!document.getElementById('unlock-pulse-style')) {
      const s = document.createElement('style');
      s.id = 'unlock-pulse-style';
      s.textContent = '@keyframes unlockPulse{0%,100%{transform:translateX(-50%) scale(1);opacity:1}50%{transform:translateX(-50%) scale(1.12);opacity:.85}}';
      document.head.appendChild(s);
    }
    document.body.appendChild(btn);
    dbg('show-unlock-btn', '');
    const doUnlock = (e) => {
      if (e) e.preventDefault();
      btn.remove(); unlockBtnShown = false;
      dbg('unlock-btn-tap', '');
      tryPlayAll();
    };
    btn.addEventListener('click',    doUnlock);
    btn.addEventListener('touchend', doUnlock, {passive:false});
  }
  function hideAudioUnlock() {
    const btn = document.getElementById('audio-unlock');
    if (btn) { btn.remove(); unlockBtnShown = false; }
  }

  // ── Микрофон ─────────────────────────────────────────────────────────────
  async function acquireStream() {
    if (localStream) return localStream;
    localStream = await navigator.mediaDevices.getUserMedia({audio:true, video:false});
    localStream.getAudioTracks().forEach(t => {
      t.enabled = false;
      t.onended = () => {
        localStream = null;
        if (talking) { stopTalk(); toast(OPEN_MODE ? 'Микрофон отключился — нажми кнопку снова' : 'Микрофон отключился'); }
      };
    });
    return localStream;
  }

  // ── Восстановление после возврата на вкладку ──────────────────────────────
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState !== 'visible') return;
    doHeartbeat();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(()=>{});
    if (localStream) {
      const track = localStream.getAudioTracks()[0];
      if (!track || track.readyState === 'ended') {
        localStream = null;
        if (talking) { stopTalk(); toast(OPEN_MODE ? 'Нажми кнопку — микрофон отключился' : 'Микрофон отключился'); }
      } else if (talking && track.readyState === 'live') {
        track.enabled = true;
      }
    }
    for (const [remoteUid, {pc}] of Object.entries(peers)) {
      if ((pc.connectionState === 'failed' || pc.connectionState === 'disconnected') && pc.signalingState === 'stable') {
        try {
          const offer = await pc.createOffer({iceRestart:true});
          await pc.setLocalDescription(offer);
          fbPut(room,'signals/'+remoteUid+'/'+myUid,{type:'offer',sdp:offer.sdp});
        } catch(e) {}
      }
    }
  });

  // ── WebRTC ────────────────────────────────────────────────────────────────

  // audioCtx и getAudioCtx — на уровне модуля (разблокированы через сплэш)
  const peerNodes = {};
  const VOLUME = 3;

  function playViaCtx(remoteUid, stream) {
    if (!audioCtx || audioCtx.state !== 'running') return false;
    if (peerNodes[remoteUid]) { try{peerNodes[remoteUid].disconnect();}catch(_){} }
    const src = audioCtx.createMediaStreamSource(stream);
    const gain = audioCtx.createGain();
    gain.gain.value = muted ? 0 : VOLUME;
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -24; comp.knee.value = 30;
    comp.ratio.value = 12; comp.attack.value = 0.003; comp.release.value = 0.25;
    src.connect(gain); gain.connect(comp); comp.connect(audioCtx.destination);
    peerNodes[remoteUid] = gain;
    dbg('ctx-play', remoteUid.slice(0,6)+' vol='+VOLUME);
    return true;
  }

  function tryPlayAll() {
    document.querySelectorAll('audio').forEach(a => {
      if (a.srcObject) {
        a.muted = true;
        a.play().then(() => {
          a.muted = muted;
          hideAudioUnlock();
        }).catch(e => dbg('tryplay-fail', String(e)));
      }
    });
  }
  // Регистрируем глобально — сплэш вызовет его после resume()
  window._tryPlayAll = tryPlayAll;

  async function makePC(remoteUid) {
    if (peers[remoteUid]) return peers[remoteUid].pc;
    const pc = new RTCPeerConnection({iceServers: ICE_SERVERS});
    peers[remoteUid] = {pc, iceTx:0};

    pc.ontrack = ({track, streams}) => {
      dbg('ontrack', `${remoteUid.slice(0,6)} kind=${track.kind} state=${track.readyState}`);
      const stream = (streams && streams[0]) ? streams[0] : new MediaStream([track]);
      let a = document.getElementById('a-'+remoteUid);
      if (!a) {
        a = new Audio(); a.id = 'a-'+remoteUid; a.autoplay = true;
        // iOS: playsinline → speaker (not earpiece); without it, routes to earpiece
        a.setAttribute('playsinline', 'true');
        a.setAttribute('webkit-playsinline', 'true');
        document.body.appendChild(a);
      }
      a.srcObject = stream;
      a.muted = true;
      a.play().then(() => {
        a.muted = muted;
        hideAudioUnlock();
        dbg('play-ok', remoteUid.slice(0,6));
      }).catch(e => {
        dbg('play-fail', String(e));
        // Показываем красную кнопку 🔊 — один тап разблокирует звук
        showAudioUnlock();
        // Параллельно: retry на любое взаимодействие (нажатие TALK тоже сработает)
        const retryPlay = (ev) => {
          dbg('play-retry', remoteUid.slice(0,6)+' on='+ev.type);
          a.muted = true;
          a.play()
            .then(() => { a.muted = muted; hideAudioUnlock(); dbg('play-retry-ok', remoteUid.slice(0,6)); })
            .catch(e2 => dbg('play-retry-fail', String(e2)));
        };
        ['click','touchstart','keydown'].forEach(ev =>
          document.addEventListener(ev, retryPlay, {once:true, passive:true})
        );
      });
    };

    pc.onicecandidate = ({candidate}) => {
      if(!candidate) return;
      if(candidate.type==='relay') dbg('ICE-relay✓', candidate.relatedAddress+' via '+candidate.address);
      const idx = peers[remoteUid].iceTx++;
      fbPut(room,'ice/'+myUid+'/'+remoteUid+'/'+idx, candidate.toJSON());
    };

    pc.oniceconnectionstatechange = () => {
      dbg('ICE→'+pc.iceConnectionState, remoteUid.slice(0,6));
    };

    // Восстановление соединения при разрыве
    pc.onconnectionstatechange = async () => {
      dbg('conn→'+pc.connectionState, remoteUid.slice(0,6));
      if (peers[remoteUid] && peers[remoteUid].disconnectTimer) {
        clearTimeout(peers[remoteUid].disconnectTimer);
        peers[remoteUid].disconnectTimer = null;
      }
      if (pc.connectionState === 'failed') {
        if (pc.signalingState === 'stable') {
          try {
            const offer = await pc.createOffer({iceRestart:true});
            await pc.setLocalDescription(offer);
            fbPut(room,'signals/'+remoteUid+'/'+myUid,{type:'offer',sdp:offer.sdp,ts:Date.now()});
            dbg('ICE-restart→sent', remoteUid.slice(0,6));
            if (peers[remoteUid]) peers[remoteUid].offerSentAt = Date.now();
          } catch(e) {}
        } else {
          dbg('conn-fail-reset', remoteUid.slice(0,6));
          dropPeer(remoteUid);
          if (presence[remoteUid]) sendOffer(remoteUid);
        }
      } else if (pc.connectionState === 'disconnected') {
        if (peers[remoteUid]) {
          peers[remoteUid].disconnectTimer = setTimeout(() => {
            if (!peers[remoteUid] || peers[remoteUid].pc !== pc) return;
            if (pc.connectionState !== 'disconnected' && pc.connectionState !== 'failed') return;
            dbg('disconnect-timeout→reset', remoteUid.slice(0,6));
            dropPeer(remoteUid);
            if (presence[remoteUid]) sendOffer(remoteUid);
          }, 2000);
        }
      }
    };

    fbListen(room,'ice/'+remoteUid+'/'+myUid,(path,data)=>{
      if(path==='/'){ if(data) Object.values(data).forEach(c=>pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{})); return; }
      if(data) pc.addIceCandidate(new RTCIceCandidate(data)).catch(()=>{});
    });
    return pc;
  }

  const SESSION_START = Date.now();

  async function sendOffer(remoteUid) {
    dbg('sendOffer→', remoteUid.slice(0,6));
    const pc = await makePC(remoteUid);
    peers[remoteUid].offerSentAt = Date.now();
    pc.addTransceiver('audio', {direction:'sendrecv'});
    const offer = await pc.createOffer();
    const sdp = offer.sdp
      .replace(/\r\na=sendonly/g, '\r\na=sendrecv')
      .replace(/\r\na=inactive/g, '\r\na=sendrecv');
    await pc.setLocalDescription({type:'offer', sdp});
    fbPut(room,'signals/'+remoteUid+'/'+myUid,{type:'offer',sdp,ts:Date.now()});
  }

  async function handleOffer(remoteUid, data) {
    if (data.ts && (Date.now() - data.ts > 60000 || data.ts < SESSION_START - 30000)) { dbg('offer-ignored stale', remoteUid.slice(0,6)); return; }
    const existingP = peers[remoteUid];
    if (existingP) {
      const ice = existingP.pc.iceConnectionState;
      // Не обрабатываем offer если ICE уже подключён (SSE-replay защита)
      if (ice === 'connected' || ice === 'completed') {
        dbg('offer-ignored ice='+ice, remoteUid.slice(0,6)); return;
      }
      // Glare resolution: оба устройства прислали offer одновременно.
      // Тот у кого меньший UID — естественный offerer, он игнорирует чужой offer.
      // Тот у кого больший UID — принимает offer другого (становится answerer).
      // Это гарантирует что ontrack сработает через handleAnswer, а не через проблемный rollback.
      if (myUid < remoteUid && existingP.pc.signalingState === 'have-local-offer') {
        dbg('offer-ignored glare', remoteUid.slice(0,6)+' natural-offerer-wins');
        return;
      }
    }
    dbg('handleOffer←', remoteUid.slice(0,6));
    const pc = await makePC(remoteUid);
    try {
      if(pc.signalingState==='have-local-offer') await pc.setLocalDescription({type:'rollback'});
      if(pc.signalingState!=='stable') { dbg('offer-skip sig='+pc.signalingState, remoteUid.slice(0,6)); return; }
      await pc.setRemoteDescription(new RTCSessionDescription(data));
      pc.getTransceivers().forEach(tc => {
        if (tc.receiver.track && tc.receiver.track.kind === 'audio') {
          try { tc.direction = 'sendrecv'; } catch(_) {}
        }
      });
      const ans = await pc.createAnswer();
      const sdp = ans.sdp
        .replace(/\r\na=recvonly/g, '\r\na=sendrecv')
        .replace(/\r\na=inactive/g, '\r\na=sendrecv');
      await pc.setLocalDescription({type:'answer', sdp});
      fbPut(room,'signals/'+remoteUid+'/'+myUid,{type:'answer',sdp,ts:Date.now()});
      dbg('answer→sent', remoteUid.slice(0,6));
    } catch(e) { dbg('handleOffer-ERR', String(e)); }
  }

  async function handleAnswer(remoteUid, data) {
    if (data.ts && (Date.now() - data.ts > 60000 || data.ts < SESSION_START - 30000)) { dbg('answer-ignored stale', remoteUid.slice(0,6)); return; }
    dbg('handleAnswer←', remoteUid.slice(0,6));
    const p = peers[remoteUid];
    if(!p || p.pc.signalingState==='stable') return;
    try { await p.pc.setRemoteDescription(new RTCSessionDescription(data)); } catch(e) {}
  }

  function dropPeer(remoteUid) {
    if (peers[remoteUid]) {
      if (peers[remoteUid].disconnectTimer) clearTimeout(peers[remoteUid].disconnectTimer);
      try{peers[remoteUid].pc.close();}catch(_){}
      delete peers[remoteUid];
    }
    // Не удаляем audio-элемент — только сбрасываем srcObject.
    // ontrack новой сессии переиспользует элемент (иначе при glare ontrack не срабатывает).
    const a = document.getElementById('a-'+remoteUid);
    if (a) a.srcObject = null;
    if (peerNodes[remoteUid]) { try{peerNodes[remoteUid].disconnect();}catch(_){} delete peerNodes[remoteUid]; }
  }

  // ── Очистка мусора от прошлой сессии ─────────────────────────────────────
  try {
    await Promise.all([
      fbDel(room,'signals/'+myUid),
      fbDel(room,'ice/'+myUid),
      fbDel(room,'talking/'+myUid),
    ]);
  } catch(e) {}

  // ── Presence ─────────────────────────────────────────────────────────────
  presence[myUid] = {name:currentMyName, speaking:false};
  dbg('registered', 'uid='+myUid.slice(0,6)+' room='+room);
  fbPut(room,'users/'+myUid,{name:currentMyName,ts:Date.now(),sid:SESSION_START});

  function onLeave() {
    fetch(fbUrl(room,'users/'+myUid),{method:'DELETE',keepalive:true});
    fetch(fbUrl(room,'talking/'+myUid),{method:'DELETE',keepalive:true});
  }
  window.addEventListener('beforeunload', onLeave);
  window.addEventListener('pagehide', onLeave);

  const doHeartbeat = () => fbPut(room,'users/'+myUid,{name:currentMyName,ts:Date.now(),sid:SESSION_START});
  setInterval(doHeartbeat, 8000);

  // ── Детектор ушедших участников ──────────────────────────────────────────
  const lastSeen = {};
  setInterval(() => {
    const now = Date.now();
    let changed = false;
    Object.keys(lastSeen).forEach(uid => {
      if (now - lastSeen[uid] > 28000) {
        fbDel(room,'users/'+uid); fbDel(room,'talking/'+uid);
        delete presence[uid]; delete peerSids[uid]; delete lastSeen[uid];
        dropPeer(uid); changed = true;
      }
    });
    if (changed) renderList();
  }, 8000);

  async function cleanGhosts() {
    let all;
    try { const res = await fetch(fbUrl(room,'users')); all = await res.json(); } catch(e){ return; }
    if (!all) return;
    Object.entries(all).forEach(([uid, data]) => {
      if (uid === myUid) return;
      if (!data || !data.name) {
        fbDel(room,'users/'+uid); fbDel(room,'talking/'+uid);
        delete presence[uid]; delete lastSeen[uid]; dropPeer(uid);
      }
    });
    renderList();
  }
  cleanGhosts();
  setInterval(cleanGhosts, 60000);

  // ── Слушатели Firebase ────────────────────────────────────────────────────
  const peerSids = {};

  fbListen(room,'users',(path,data)=>{
    const proc=(uid,d)=>{
      if(uid===myUid)return;
      if(!d || !d.name){
        if(d && !d.name) { fbDel(room,'users/'+uid); fbDel(room,'talking/'+uid); }
        delete presence[uid]; delete peerSids[uid]; dropPeer(uid);
      } else {
        // sidChanged = только если новый sid БОЛЬШЕ (пир реально перезагрузился).
        // Если новый sid МЕНЬШЕ — протухшая запись из старой сессии, игнорируем.
        const isStale    = d.sid && peerSids[uid] && d.sid < peerSids[uid];
        if (isStale) { dbg('SSE-stale-ignored', uid.slice(0,6)); return; }
        const sidChanged = d.sid && peerSids[uid] && d.sid > peerSids[uid];
        if (sidChanged) { dropPeer(uid); delete presence[uid]; }
        if (d.sid) peerSids[uid] = d.sid;
        lastSeen[uid] = Date.now();
        if (!presence[uid]) {
          presence[uid]={name:d.name,speaking:false};
          if(myUid<uid) {
            sendOffer(uid);
          } else {
            // Answerer: ждём offer 5с, если нет — сами инициируем (fix race condition)
            const capName = d.name;
            setTimeout(() => {
              if (!presence[uid]) return;
              const p = peers[uid];
              const ice = p && p.pc.iceConnectionState;
              if (!p || (ice !== 'connected' && ice !== 'completed' && ice !== 'checking')) {
                dbg('offer-fallback', uid.slice(0,6)+' no offer in 5s');
                if (p) dropPeer(uid);
                if (!presence[uid]) presence[uid] = {name:capName, speaking:false};
                sendOffer(uid);
              }
            }, 5000);
          }
        } else {
          presence[uid].name = d.name;
          // Если оферрор и offer завис без ответа >8с — переотправляем
          if (myUid < uid) {
            if (!peers[uid]) {
              dbg('offer-failsafe', uid.slice(0,6)+' no PC, resend');
              sendOffer(uid);
            } else {
              const pc = peers[uid].pc;
              const age = Date.now() - (peers[uid].offerSentAt || 0);
              if (pc.signalingState === 'have-local-offer' && age > 8000) {
                dbg('offer-timeout→retry', uid.slice(0,6)+' age='+(age/1000|0)+'s');
                dropPeer(uid);
                delete presence[uid];
                presence[uid]={name:d.name,speaking:false};
                sendOffer(uid);
              }
            }
          }
        }
      }
    };
    if(path==='/'){if(data)Object.entries(data).forEach(([uid,d])=>proc(uid,d));}
    else proc(path.slice(1),data);
    renderList();
  });

  fbListen(room,'signals/'+myUid,(path,data)=>{
    const proc=(fromUid,sig)=>{ if(!sig)return; if(sig.type==='offer')handleOffer(fromUid,sig); if(sig.type==='answer')handleAnswer(fromUid,sig); };
    if(path==='/'){if(data)Object.entries(data).forEach(([uid,s])=>proc(uid,s));}
    else proc(path.slice(1),data);
  });

  fbListen(room,'talking',(path,data)=>{
    const proc=(uid,val)=>{ if(uid===myUid)return; if(presence[uid])presence[uid].speaking=!!val; };
    if(path==='/'){if(data)Object.entries(data).forEach(([uid,v])=>proc(uid,v));}
    else proc(path.slice(1),data);
    renderList();
    if(!talking){ const sp=Object.entries(presence).find(([uid,p])=>uid!==myUid&&p.speaking); setStatus(sp?sp[1].name+' говорит…':'Онлайн: '+Object.keys(presence).length+' чел.'); }
  });

  tbtn.disabled=false;
  renderList();
  setStatus('Онлайн: 1 чел.');

  const HINT_IDLE = OPEN_MODE ? 'Нажми чтобы начать говорить' : 'Удерживай кнопку чтобы говорить';
  const HINT_TALK = OPEN_MODE ? 'Нажми чтобы замолчать'       : 'Отпусти, чтобы замолчать';
  $('m-hint').textContent = HINT_IDLE;

  // ── PTT / Open-mode ──────────────────────────────────────────────────────
  async function startTalk() {
    if(talking||tbtn.disabled)return;
    try {
      const s = await acquireStream();
      s.getAudioTracks().forEach(t => t.enabled = true);
      const audioTrack = s.getAudioTracks()[0];
      const peerCount = Object.keys(peers).length;
      dbg('startTalk', 'peers='+peerCount+' track='+audioTrack.readyState+' en='+audioTrack.enabled);
      for (const [remoteUid, {pc}] of Object.entries(peers)) {
        const senders = pc.getSenders();
        const ice = pc.iceConnectionState;
        dbg('talk-peer', remoteUid.slice(0,6)+' ice='+ice+' senders='+senders.length+' sig='+pc.signalingState);
        senders.forEach((snd,i)=>dbg('  sender'+i, (snd.track?snd.track.kind+'/'+snd.track.readyState+'/en='+snd.track.enabled:'null')));
        const sender = senders.find(snd => !snd.track || snd.track.kind === 'audio');
        if (sender) {
          dbg('replaceTrack→', remoteUid.slice(0,6)+' hadTrack='+(sender.track?sender.track.readyState:'null'));
          sender.replaceTrack(audioTrack)
            .then(()=>dbg('replaceTrack-ok', remoteUid.slice(0,6)))
            .catch(e=>dbg('replaceTrack-ERR',String(e)));
        } else {
          dbg('addTrack→', remoteUid.slice(0,6)+' (no sender found)');
          pc.addTrack(audioTrack, s);
          if (pc.signalingState === 'stable') {
            try {
              const offer = await pc.createOffer();
              await pc.setLocalDescription(offer);
              fbPut(room,'signals/'+remoteUid+'/'+myUid,{type:'offer',sdp:offer.sdp,ts:Date.now()});
              dbg('addTrack-offer→sent', remoteUid.slice(0,6));
            } catch(e) { dbg('addTrack-offer-ERR',String(e)); }
          }
        }
      }
      tryPlayAll();
      talking=true; tbtn.classList.add('pressing'); $('m-hint').textContent=HINT_TALK;
      setStatus('Ты говоришь…',true); if(presence[myUid])presence[myUid].speaking=true; renderList();
      fbPut(room,'talking/'+myUid,true);
    } catch(e){ toast('Нет доступа к микрофону'); }
  }

  function stopTalk() {
    if(!talking)return;
    if(localStream)localStream.getAudioTracks().forEach(t=>t.enabled=false);
    talking=false; tbtn.classList.remove('pressing'); $('m-hint').textContent=HINT_IDLE;
    if(presence[myUid])presence[myUid].speaking=false; renderList();
    fbDel(room,'talking/'+myUid); setStatus('Онлайн: '+Object.keys(presence).length+' чел.');
  }

  if (OPEN_MODE) {
    tbtn.addEventListener('click', e => { e.preventDefault(); if (talking) stopTalk(); else startTalk(); });
  } else {
    tbtn.addEventListener('mousedown',  e=>{e.preventDefault();startTalk();});
    tbtn.addEventListener('touchstart', e=>{e.preventDefault();startTalk();},{passive:false});
    tbtn.addEventListener('mouseup',    stopTalk);
    tbtn.addEventListener('touchend',   e=>{e.preventDefault();stopTalk();},{passive:false});
    tbtn.addEventListener('mouseleave', stopTalk);
    tbtn.addEventListener('touchcancel',stopTalk);
  }

  mbtn.addEventListener('click',()=>{
    muted=!muted; mbtn.textContent=muted?'🔇':'🔊'; mbtn.classList.toggle('muted',muted);
    document.querySelectorAll('audio').forEach(a=>{ a.muted=muted; });
    Object.values(peerNodes).forEach(gain=>{ gain.gain.value = muted ? 0 : VOLUME; });
    toast(muted?'Звук выключен':'Звук включён');
  });
}
</script>
</body>
</html>
