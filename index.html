<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>📻 Рация</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0d1a; --card: #161628; --green: #00d46a;
      --red: #ff3b30; --blue: #4a9eff; --text: #fff; --muted: #6b7280;
    }
    html, body {
      height: 100%; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overflow: hidden; user-select: none; -webkit-user-select: none;
    }

    /* ── App shell ── */
    #app {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      padding: 8px 8px 0 8px;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      gap: 8px;
    }

    /* ── Header ── */
    .hd {
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; height: 34px;
    }
    .hd-left  { display: flex; align-items: center; gap: 7px; }
    .hd-logo  { font-size: 1.15rem; line-height: 1; }
    .hd-title { font-size: .92rem; font-weight: 700; cursor: default; }
    .hd-room  {
      background: rgba(74,158,255,.1); border: 1px solid rgba(74,158,255,.24);
      color: var(--blue); font-size: .72rem; font-weight: 700;
      letter-spacing: .1em; padding: 2px 10px; border-radius: 20px; cursor: pointer;
      transition: background .15s;
    }
    .hd-room:active { background: rgba(74,158,255,.2); }
    .hd-chint { font-size: .64rem; color: var(--green); opacity: 0; transition: opacity .3s; margin-left: 4px; }
    .hd-chint.on { opacity: 1; }

    /* ── Participant list ── */
    #peer-list {
      flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;
      padding-bottom: 4px; min-height: 0;
    }
    #peer-list::-webkit-scrollbar { width: 0; }

    .peer-card {
      background: var(--card); border-radius: 14px;
      border: 2px solid transparent; padding: 12px 14px;
      display: flex; align-items: center; gap: 12px;
      transition: border-color .2s, background .2s;
    }
    .peer-card.speaking {
      border-color: rgba(0,212,106,.65);
      background: rgba(0,212,106,.07);
    }

    .peer-avatar {
      width: 42px; height: 42px; border-radius: 50%; flex-shrink: 0;
      background: rgba(74,158,255,.18); border: 2px solid rgba(74,158,255,.25);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.05rem; font-weight: 700; color: var(--blue);
      text-transform: uppercase; transition: background .2s, border-color .2s, color .2s;
    }
    .peer-card.speaking .peer-avatar {
      background: rgba(0,212,106,.2); border-color: rgba(0,212,106,.55); color: var(--green);
    }

    .peer-info { flex: 1; min-width: 0; }
    .peer-name { font-size: .9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .peer-status { font-size: .72rem; color: var(--green); margin-top: 2px; }
    .me-tag { font-size: .65rem; color: var(--muted); font-weight: 400; margin-left: 5px; }

    .peer-wave {
      font-size: 1.3rem; flex-shrink: 0;
      animation: wave-bounce .5s ease-in-out infinite alternate;
    }
    @keyframes wave-bounce {
      from { transform: scale(.88) rotate(-6deg); }
      to   { transform: scale(1.12) rotate(6deg); }
    }

    /* ── Hint ── */
    #m-hint {
      text-align: center; font-size: .76rem; color: var(--muted);
      flex-shrink: 0; min-height: 18px; transition: color .2s;
    }
    #m-hint.active { color: var(--green); }
    #m-hint.locked { color: var(--red); }

    /* ── Talk button ── */
    #talk-area {
      display: flex; flex-direction: column; align-items: center;
      flex-shrink: 0; padding-bottom: 14px;
    }

    #tbtn {
      width: 132px; height: 132px; border-radius: 50%;
      background: radial-gradient(circle at 38% 35%, #00d46a, #009e50);
      box-shadow: 0 0 0 12px rgba(0,212,106,.08), 0 8px 32px rgba(0,212,106,.35),
                  inset 0 2px 0 rgba(255,255,255,.2);
      color: #fff; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 5px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: transform .08s, box-shadow .12s, background .15s, opacity .2s;
      touch-action: none;
    }
    #tbtn .btn-icon { font-size: 2rem; line-height: 1; pointer-events: none; }
    #tbtn .btn-lbl  { font-size: .75rem; font-weight: 800; letter-spacing: .14em; pointer-events: none; }

    #tbtn.pressing {
      transform: scale(.93);
      background: radial-gradient(circle at 38% 35%, #00ff82, #00c060);
      box-shadow: 0 0 0 18px rgba(0,212,106,.18), 0 4px 22px rgba(0,212,106,.55),
                  inset 0 2px 0 rgba(255,255,255,.25);
    }
    #tbtn.locked {
      background: radial-gradient(circle at 38% 35%, #555, #2e2e2e);
      box-shadow: 0 0 0 10px rgba(100,100,100,.05), 0 4px 14px rgba(0,0,0,.25);
      opacity: .55; cursor: not-allowed;
    }
    #tbtn.connecting {
      background: radial-gradient(circle at 38% 35%, #4a9eff, #1a6fd4);
      box-shadow: 0 0 0 12px rgba(74,158,255,.08), 0 6px 24px rgba(74,158,255,.3),
                  inset 0 2px 0 rgba(255,255,255,.2);
      opacity: .7; cursor: not-allowed;
      animation: conn-pulse 1.4s ease-in-out infinite;
    }
    @keyframes conn-pulse {
      0%,100% { opacity: .7; }
      50%      { opacity: .45; }
    }

    /* ── Splash ── */
    #splash {
      position: fixed; inset: 0; z-index: 3000; background: var(--bg);
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 10px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      transition: opacity .35s ease; user-select: none; -webkit-user-select: none;
    }
    #splash.out { opacity: 0; pointer-events: none; }
    .sp-logo  { font-size: 3rem; line-height: 1; }
    .sp-title { font-size: 1.5rem; font-weight: 800; }
    .sp-room-lbl   { color: var(--muted); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; margin-top: 8px; }
    .sp-room-badge {
      background: rgba(74,158,255,.1); border: 1px solid rgba(74,158,255,.24);
      color: var(--blue); font-size: .85rem; font-weight: 700;
      letter-spacing: .1em; padding: 3px 14px; border-radius: 20px;
    }
    .sp-btn {
      margin-top: 24px; width: 148px; height: 148px; border-radius: 50%; border: none;
      background: radial-gradient(circle at 38% 35%, #00d46a, #009e50);
      box-shadow: 0 0 0 10px rgba(0,212,106,.08), 0 8px 32px rgba(0,212,106,.38),
                  inset 0 2px 0 rgba(255,255,255,.2);
      color: #fff; font-size: .95rem; font-weight: 800; letter-spacing: .14em;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 6px; pointer-events: none;
      transition: transform .08s, box-shadow .08s;
    }
    #splash:active .sp-btn {
      transform: scale(.93);
      box-shadow: 0 0 0 10px rgba(0,212,106,.12), 0 4px 20px rgba(0,212,106,.3),
                  inset 0 2px 0 rgba(255,255,255,.15);
    }
    .sp-hint { color: var(--muted); font-size: .72rem; margin-top: 10px; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(60px);
      background: rgba(255,255,255,.12); backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,.1);
      color: #fff; padding: 8px 16px; border-radius: 18px;
      font-size: .8rem; transition: transform .3s;
      pointer-events: none; white-space: nowrap; z-index: 5000;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Debug ── */
    #dbg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.93); z-index: 9999; flex-direction: column; font-family: monospace; font-size: 11px; color: #ccc; }
    #dbg.on { display: flex; }
    #dbg-head { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; border-bottom: 1px solid #222; flex-shrink: 0; }
    #dbg-head span { color: #fff; font-size: 13px; font-weight: 700; }
    #dbg-close, #dbg-copy, #dbg-clear { background: none; border: 1px solid #444; color: #aaa; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 11px; }
    #dbg-body { flex: 1; overflow-y: auto; padding: 10px 14px; }
    #dbg-log  { background: #0a0a14; border-radius: 8px; padding: 8px 10px; }
    .dbg-entry { padding: 2px 0; border-bottom: 1px solid #111; }
    .dbg-entry .t      { color: #444; margin-right: 5px; }
    .dbg-entry .ev     { color: #7dd3fc; }
    .dbg-entry .detail { color: #6b7280; }
  </style>
</head>
<body>

<div id="app">
  <div class="hd">
    <div class="hd-left">
      <div class="hd-logo">📻</div>
      <div class="hd-title">Рация</div>
      <div style="display:flex;align-items:center;gap:5px;">
        <span style="color:var(--muted);font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;">Комната</span>
        <span class="hd-room" id="m-room">—</span>
        <span class="hd-chint" id="m-chint">✓ скопировано</span>
      </div>
    </div>
    <div id="peer-count" style="font-size:.72rem;color:var(--muted);"></div>
  </div>

  <div id="peer-list"></div>

  <div id="m-hint">Зажми кнопку чтобы говорить</div>

  <div id="talk-area">
    <div id="tbtn">
      <span class="btn-icon">🎙</span>
      <span class="btn-lbl">TALK</span>
    </div>
  </div>
</div>

<div id="toast"></div>

<div id="splash">
  <div class="sp-logo">📻</div>
  <div class="sp-title">Рация</div>
  <div class="sp-room-lbl">Комната</div>
  <div class="sp-room-badge" id="sp-room">—</div>
  <div class="sp-btn">
    <span style="font-size:1.9rem">📻</span>
    <span>ВОЙТИ</span>
  </div>
  <div class="sp-hint">Нажми чтобы войти</div>
</div>

<div id="dbg">
  <div id="dbg-head">
    <span>🔧 Debug</span>
    <div style="display:flex;gap:6px">
      <button id="dbg-copy">Копировать</button>
      <button id="dbg-clear">Сброс</button>
      <button id="dbg-close">Закрыть</button>
    </div>
  </div>
  <div id="dbg-body"><div id="dbg-log"></div></div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const DB = 'https://racia-275ba-default-rtdb.europe-west1.firebasedatabase.app';
const ICE_FALLBACK = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'turn:a.relay.metered.ca:80',               username:'487b1823f1e0ce14f1f2b901', credential:'ehdRPgYE8003rQWu' },
  { urls: 'turn:a.relay.metered.ca:443?transport=tcp', username:'487b1823f1e0ce14f1f2b901', credential:'ehdRPgYE8003rQWu' },
  { urls: 'turns:a.relay.metered.ca:443',              username:'487b1823f1e0ce14f1f2b901', credential:'ehdRPgYE8003rQWu' },
];
let ICE_SERVERS = ICE_FALLBACK;
async function loadIceServers() {
  try {
    const r = await fetch('https://annmiro.metered.live/api/v1/turn/credentials?apiKey=3441f7c12cc6972242a1364ddba767e06a7c');
    const s = await r.json();
    if (s && s.length) { ICE_SERVERS = s; dbg('TURN-api✓', s.length+' servers'); }
  } catch(e) { dbg('TURN-api-fallback', String(e)); }
}
loadIceServers();

// ── Funny names ───────────────────────────────────────────────────────────────
const ADJ  = ['Быстрый','Лихой','Дерзкий','Крутой','Смелый','Дикий','Хитрый','Ловкий','Шустрый','Удалой','Бравый','Лютый','Сонный','Хмурый','Весёлый','Мощный','Пушистый','Звонкий','Ярый','Хрустящий'];
const NOUN = ['Бобёр','Лось','Медведь','Заяц','Волк','Лиса','Бурундук','Сурок','Орёл','Сова','Ёж','Кабан','Рысь','Соболь','Снегирь','Зубр','Барсук','Суслик','Хомяк','Глухарь'];
function funnyName() { return ADJ[Math.random()*ADJ.length|0]+' '+NOUN[Math.random()*NOUN.length|0]; }

// ── Helpers ───────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function toast(msg, dur=2500) {
  const el=$('toast'); el.textContent=msg; el.classList.add('show');
  clearTimeout(el._t); el._t=setTimeout(()=>el.classList.remove('show'), dur);
}

function fbUrl(room,path) { return `${DB}/rooms/${room}/${path}.json`; }
function fbPut(room,path,val)  { return fetch(fbUrl(room,path),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(val)}); }
function fbDel(room,path)      { return fetch(fbUrl(room,path),{method:'DELETE'}); }
function fbGet(room,path)      { return fetch(fbUrl(room,path)).then(r=>r.json()).catch(()=>null); }

function fbListen(room, path, cb, opts={}) {
  const {pollMs=0} = opts;
  let es, reconnTimer, pollTimer;
  function connect() {
    if (es) { try{es.close();}catch(_){} }
    clearTimeout(reconnTimer);
    es = new EventSource(fbUrl(room,path)+'?stream=true');
    es.addEventListener('put',   e => { const d=JSON.parse(e.data); cb(d.path,d.data); });
    es.addEventListener('error', () => { reconnTimer=setTimeout(connect,2000); });
    es.addEventListener('open',  () => dbg('SSE-open', path.slice(0,24)));
  }
  connect();
  if (pollMs) {
    pollTimer = setInterval(() => {
      fbGet(room, path).then(data => { if (data !== null) cb('/', data); }).catch(()=>{});
    }, pollMs);
  }
  return { close: () => { clearTimeout(reconnTimer); clearInterval(pollTimer); if(es) es.close(); } };
}

// ── Room ──────────────────────────────────────────────────────────────────────
const P = new URLSearchParams(window.location.search);
let room = P.get('room');
if (!room) {
  room = Math.random().toString(36).slice(2,8).toUpperCase();
  const u = new URL(location.href); u.searchParams.set('room',room); history.replaceState({},'',u);
}
$('m-room').textContent  = room;
$('sp-room').textContent = room;

$('m-room').addEventListener('click', () => {
  navigator.clipboard.writeText(location.href).then(() => {
    toast('Ссылка скопирована!');
    $('m-chint').classList.add('on');
    setTimeout(()=>$('m-chint').classList.remove('on'), 2200);
  });
});

// ── AudioContext (unlocks iOS audio on first gesture) ─────────────────────────
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// ── Debug ─────────────────────────────────────────────────────────────────────
const DEBUG_MODE = P.get('debug') === '1';
let dbgLog = [];
try { const s=sessionStorage.getItem('racia_dbg'); if(s) dbgLog=JSON.parse(s); } catch(_){}
const T0 = Date.now();
function dbg(event, detail='') {
  const sec = ((Date.now()-T0)/1000).toFixed(1);
  dbgLog.unshift({sec,event,detail});
  if (dbgLog.length>150) dbgLog.length=150;
  try { sessionStorage.setItem('racia_dbg', JSON.stringify(dbgLog.slice(0,150))); } catch(_){}
  if ($('dbg').classList.contains('on')) renderDbg();
}
function renderDbg() {
  $('dbg-log').innerHTML = dbgLog.map(e =>
    `<div class="dbg-entry"><span class="t">${e.sec}s</span><span class="ev">${e.event}</span>${e.detail?' <span class="detail">'+e.detail+'</span>':''}</div>`
  ).join('');
}
if (DEBUG_MODE) { $('dbg').classList.add('on'); setInterval(renderDbg,1000); }
$('dbg-close').addEventListener('click', ()=>$('dbg').classList.remove('on'));
$('dbg-clear').addEventListener('click', ()=>{ dbgLog.length=0; try{sessionStorage.removeItem('racia_dbg');}catch(_){} renderDbg(); });
$('dbg-copy').addEventListener('click', ()=>{
  navigator.clipboard.writeText(dbgLog.map(e=>`${e.sec}s ${e.event} ${e.detail}`).join('\n'))
    .then(()=>toast('Лог скопирован'));
});
let tapCount=0, tapTimer=0;
document.querySelector('.hd-title').addEventListener('click', ()=>{
  tapCount++; clearTimeout(tapTimer); tapTimer=setTimeout(()=>tapCount=0,800);
  if (tapCount>=5) { tapCount=0; $('dbg').classList.toggle('on'); renderDbg(); setInterval(renderDbg,1000); }
});

// ── Identity ──────────────────────────────────────────────────────────────────
let myName = localStorage.getItem('racia_name') || funnyName();
localStorage.setItem('racia_name', myName);
const myUid = localStorage.getItem('racia_uid') || Math.random().toString(36).slice(2,10);
localStorage.setItem('racia_uid', myUid);

// ── Splash ────────────────────────────────────────────────────────────────────
(function() {
  const splash = $('splash');
  if (DEBUG_MODE) { splash.style.display='none'; setTimeout(enterRoom,100); return; }
  function onEnter(e) {
    if (e.type==='touchend') e.preventDefault();
    splash.removeEventListener('click',    onEnter);
    splash.removeEventListener('touchend', onEnter);
    enterRoom();
  }
  splash.addEventListener('click',    onEnter);
  splash.addEventListener('touchend', onEnter);
})();

// ── Entry ─────────────────────────────────────────────────────────────────────
async function enterRoom() {
  try { getAudioCtx().resume(); } catch(_){} // unlock iOS audio session during gesture
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      audio: { echoCancellation:true, noiseSuppression:true, autoGainControl:true },
      video: false
    });
    stream.getAudioTracks().forEach(t => t.enabled = false); // muted until PTT
    dbg('media-ok','audio-only muted');
  } catch(e) {
    toast('Нет доступа к микрофону 😢');
    dbg('media-err', String(e)); return;
  }

  const splash = $('splash');
  splash.classList.add('out');
  setTimeout(()=>{ splash.style.display='none'; }, 380);

  startApp(stream);
}

// ════════════════════════════════════════════════════════════════════════════
async function startApp(localStream) {
  const presence  = {};
  const peers     = {};
  const peerSids  = {};
  const lastSeen  = {};
  const SESSION_START = Date.now();

  let talking = false;

  const tbtn = $('tbtn');

  // ── Participant list ──────────────────────────────────────────────────────
  function renderList() {
    const list = $('peer-list');
    const all = [
      {uid: myUid, name: myName, speaking: talking, isMe: true},
      ...Object.entries(presence)
        .filter(([uid]) => uid !== myUid)
        .map(([uid, p]) => ({uid, name: p.name, speaking: p.speaking, isMe: false}))
    ];

    list.innerHTML = all.map(({name, speaking, isMe}) => {
      const letter = (name||'?').trim().charAt(0).toUpperCase();
      return `<div class="peer-card${speaking?' speaking':''}">
        <div class="peer-avatar">${letter}</div>
        <div class="peer-info">
          <div class="peer-name">${name}${isMe?'<span class="me-tag"> ты</span>':''}</div>
          ${speaking?'<div class="peer-status">говорит…</div>':''}
        </div>
        ${speaking?'<div class="peer-wave">📣</div>':''}
      </div>`;
    }).join('');

    const n = all.length;
    $('peer-count').textContent = n > 1 ? `${n} чел.` : '';
  }

  // ── Talk button state ─────────────────────────────────────────────────────
  function someoneElseTalking() {
    return Object.entries(presence).some(([uid, p]) => uid !== myUid && p.speaking);
  }

  // True if we have remote peers but none has an active WebRTC connection yet.
  // Checks both connectionState AND iceConnectionState — iOS Chrome never fires
  // onconnectionstatechange→'connected' but iceConnectionState works correctly.
  function isConnecting() {
    const hasPeers = Object.keys(presence).some(uid => uid !== myUid);
    if (!hasPeers) return false;
    const hasConnected = Object.values(peers).some(({pc}) =>
      pc.connectionState === 'connected' ||
      pc.connectionState === 'completed' ||
      pc.iceConnectionState === 'connected' ||
      pc.iceConnectionState === 'completed'
    );
    return !hasConnected;
  }

  function updateTalkBtn() {
    const locked      = someoneElseTalking() && !talking;
    const connecting  = isConnecting() && !talking;
    tbtn.classList.toggle('pressing',   talking);
    tbtn.classList.toggle('locked',     locked && !connecting);
    tbtn.classList.toggle('connecting', connecting);
    const hint = $('m-hint');
    if (talking) {
      hint.textContent = 'Отпусти чтобы замолчать';
      hint.className = 'active';
    } else if (connecting) {
      hint.textContent = 'Подключаюсь…';
      hint.className = 'locked';
    } else if (locked) {
      hint.textContent = 'Эфир занят…';
      hint.className = 'locked';
    } else {
      hint.textContent = 'Зажми кнопку чтобы говорить';
      hint.className = '';
    }
  }

  // ── PTT ───────────────────────────────────────────────────────────────────
  function startTalk(e) {
    if (e) e.preventDefault();
    if (someoneElseTalking()) return;
    if (isConnecting()) return;   // block until ICE ready
    if (talking) return;
    talking = true;
    // Retry any paused audio — PTT press is a user gesture, best moment to unlock iOS
    document.querySelectorAll('audio[id^="audio-"]').forEach(a => {
      if (a.srcObject && a.paused) a.play().catch(()=>{});
    });
    try { getAudioCtx().resume(); } catch(_){}
    localStream.getAudioTracks().forEach(t => t.enabled = true);
    // Ensure all existing senders get the live track
    const audioTrack = localStream.getAudioTracks()[0];
    if (audioTrack) {
      for (const {pc} of Object.values(peers)) {
        pc.getSenders().forEach(s => {
          if (s.track && s.track.kind === 'audio') s.replaceTrack(audioTrack).catch(()=>{});
        });
      }
    }
    fbPut(room, 'talking/'+myUid, true);
    renderList();
    updateTalkBtn();
    dbg('talk-start','');
  }

  function stopTalk(e) {
    if (e) e.preventDefault();
    if (!talking) return;
    talking = false;
    localStream.getAudioTracks().forEach(t => t.enabled = false);
    fbDel(room, 'talking/'+myUid);
    renderList();
    updateTalkBtn();
    dbg('talk-stop','');
  }

  // Desktop
  tbtn.addEventListener('mousedown', startTalk);
  window.addEventListener('mouseup',  stopTalk);

  // Mobile
  tbtn.addEventListener('touchstart',    startTalk, {passive:false});
  window.addEventListener('touchend',    stopTalk,  {passive:false});
  window.addEventListener('touchcancel', stopTalk,  {passive:false});

  // Watchdog: retry paused audio every 4s (iOS may pause after screen lock / bg)
  setInterval(() => {
    document.querySelectorAll('audio[id^="audio-"]').forEach(a => {
      if (a.srcObject && a.paused) {
        dbg('watchdog-resume', a.id);
        a.play().catch(e => dbg('watchdog-play-err', a.id+' '+String(e)));
      }
    });
  }, 4000);

  // ── WebRTC ────────────────────────────────────────────────────────────────
  async function makePC(remoteUid) {
    if (peers[remoteUid]) return peers[remoteUid].pc;
    const pc = new RTCPeerConnection({iceServers: ICE_SERVERS});
    peers[remoteUid] = {pc, iceTx:0, offerSentAt:0, disconnectTimer:null};

    // Add local audio track (muted via track.enabled; still in sender)
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

    // Incoming audio → hidden <audio> element
    const incomingStreams = {};
    pc.ontrack = ({track, streams}) => {
      dbg('ontrack', remoteUid.slice(0,6)+' kind='+track.kind);
      if (track.kind !== 'audio') return;
      // Mirror index_v1 pattern: prefer streams[0], fallback to manual MediaStream
      const s = (streams && streams[0])
        ? streams[0]
        : (incomingStreams[remoteUid] || (incomingStreams[remoteUid] = new MediaStream()));
      incomingStreams[remoteUid] = s;
      if (!(streams && streams[0]) && !s.getTracks().includes(track)) s.addTrack(track);

      let audio = $('audio-'+remoteUid);
      if (!audio) {
        audio = document.createElement('audio');
        audio.id = 'audio-'+remoteUid;
        audio.autoplay = true;
        audio.playsInline = true; // property (iOS needs this)
        audio.setAttribute('playsinline','');
        audio.setAttribute('webkit-playsinline','');
        document.body.appendChild(audio);
      }
      if (audio.srcObject !== s) audio.srcObject = s;
      audio.play().catch(e => dbg('audio-play-err', remoteUid.slice(0,6)+' '+String(e)));
    };

    pc.onicecandidate = ({candidate}) => {
      if (!candidate) return;
      if (candidate.type==='relay') dbg('ICE-relay✓', candidate.address);
      const idx = peers[remoteUid].iceTx++;
      fbPut(room, 'ice/'+myUid+'/'+remoteUid+'/'+idx, candidate.toJSON());
    };

    pc.oniceconnectionstatechange = () => {
      dbg('ICE→'+pc.iceConnectionState, remoteUid.slice(0,6));
      if (pc.iceConnectionState === 'connected' || pc.iceConnectionState === 'completed') {
        updateTalkBtn();
        const audio = $('audio-'+remoteUid);
        if (audio && audio.srcObject && audio.paused) {
          audio.play().catch(e => dbg('ice-audio-retry-err', remoteUid.slice(0,6)+' '+String(e)));
        }
      }
    };

    pc.onconnectionstatechange = async () => {
      dbg('conn→'+pc.connectionState, remoteUid.slice(0,6));
      const p = peers[remoteUid]; if (!p) return;
      if (p.disconnectTimer) { clearTimeout(p.disconnectTimer); p.disconnectTimer=null; }

      if (pc.connectionState === 'connected') {
        // Unblock Talk button now that transport is ready
        updateTalkBtn();
        // Retry audio immediately — don't wait for watchdog (fix for reconnect delay)
        const audio = $('audio-'+remoteUid);
        if (audio && audio.srcObject && audio.paused) {
          audio.play().catch(e => dbg('conn-audio-retry-err', remoteUid.slice(0,6)+' '+String(e)));
          dbg('conn-audio-retry', remoteUid.slice(0,6));
        }
      }

      if (pc.connectionState === 'failed') {
        if (myUid < remoteUid && pc.signalingState === 'stable') {
          try {
            const o=await pc.createOffer({iceRestart:true}); await pc.setLocalDescription(o);
            fbPut(room,'signals/'+remoteUid+'/'+myUid, {type:'offer',sdp:o.sdp,ts:Date.now()});
          } catch(e) { dropPeer(remoteUid); if(presence[remoteUid]&&myUid<remoteUid) sendOffer(remoteUid); }
        } else {
          dropPeer(remoteUid); if(presence[remoteUid]&&myUid<remoteUid) sendOffer(remoteUid);
        }
      } else if (pc.connectionState === 'disconnected') {
        p.disconnectTimer = setTimeout(async () => {
          const pp=peers[remoteUid]; if (!pp||pp.pc!==pc) return;
          if (pc.connectionState!=='disconnected'&&pc.connectionState!=='failed') return;
          if (myUid < remoteUid && pc.signalingState === 'stable') {
            try {
              const o=await pc.createOffer({iceRestart:true}); await pc.setLocalDescription(o);
              fbPut(room,'signals/'+remoteUid+'/'+myUid, {type:'offer',sdp:o.sdp,ts:Date.now()});
              pp.offerSentAt=Date.now();
            } catch(e) { dropPeer(remoteUid); if(presence[remoteUid]) sendOffer(remoteUid); }
          } else {
            dropPeer(remoteUid); if(presence[remoteUid]&&myUid<remoteUid) sendOffer(remoteUid);
          }
        }, 2000);
      }
    };

    // ICE from remote
    fbListen(room, 'ice/'+remoteUid+'/'+myUid, (path, data) => {
      if (path==='/') { if(data) Object.values(data).forEach(c=>pc.addIceCandidate(new RTCIceCandidate(c)).catch(()=>{})); return; }
      if (data) pc.addIceCandidate(new RTCIceCandidate(data)).catch(()=>{});
    });

    // DataChannel keepalive
    const kaSetup = dc => {
      let ki=null;
      dc.onopen  = ()=>{ ki=setInterval(()=>{ if(dc.readyState==='open') try{dc.send('k');}catch(_){} },8000); dbg('ka-open',remoteUid.slice(0,6)); };
      dc.onclose = ()=>{ if(ki){clearInterval(ki);ki=null;} };
    };
    if (myUid < remoteUid) kaSetup(pc.createDataChannel('ka'));
    else pc.ondatachannel = ({channel}) => kaSetup(channel);

    return pc;
  }

  async function sendOffer(remoteUid) {
    dbg('sendOffer→', remoteUid.slice(0,6));
    // Clean stale ICE candidates before new attempt so remote only sees fresh ones
    fbDel(room, 'ice/'+myUid+'/'+remoteUid);
    const pc = await makePC(remoteUid);
    peers[remoteUid].offerSentAt = Date.now();
    const offer = await pc.createOffer();
    const sdp = offer.sdp
      .replace(/\r\na=sendonly/g,'\r\na=sendrecv')
      .replace(/\r\na=inactive/g,'\r\na=sendrecv');
    await pc.setLocalDescription({type:'offer',sdp});
    fbPut(room,'signals/'+remoteUid+'/'+myUid, {type:'offer',sdp,ts:Date.now()});
  }

  async function handleOffer(remoteUid, data) {
    if (data.ts && (Date.now()-data.ts>90000 || data.ts<SESSION_START-5000)) {
      dbg('offer-stale', remoteUid.slice(0,6)+'  age='+Math.round((Date.now()-data.ts)/1000)+'s'); return;
    }
    if (myUid < remoteUid) { dbg('offer-ignored offerer-role', remoteUid.slice(0,6)); return; }
    const ep = peers[remoteUid];
    if (ep) {
      const ice=ep.pc.iceConnectionState;
      if (ice==='connected'||ice==='completed') {
        dbg('offer-reconnect drop+rehandle', remoteUid.slice(0,6));
        dropPeer(remoteUid);
      }
    }
    dbg('handleOffer←', remoteUid.slice(0,6));
    // Clean our own stale ICE so offerer only sees fresh candidates from this answer
    fbDel(room, 'ice/'+myUid+'/'+remoteUid);
    const pc = await makePC(remoteUid);
    try {
      if (pc.signalingState==='have-local-offer') await pc.setLocalDescription({type:'rollback'});
      if (pc.signalingState!=='stable') { dbg('offer-skip sig='+pc.signalingState, remoteUid.slice(0,6)); return; }
      await pc.setRemoteDescription(new RTCSessionDescription(data));
      const ans = await pc.createAnswer();
      const sdp = ans.sdp
        .replace(/\r\na=recvonly/g,'\r\na=sendrecv')
        .replace(/\r\na=inactive/g,'\r\na=sendrecv');
      await pc.setLocalDescription({type:'answer',sdp});
      fbPut(room,'signals/'+remoteUid+'/'+myUid, {type:'answer',sdp,ts:Date.now()});
      dbg('answer→sent', remoteUid.slice(0,6));
    } catch(e) { dbg('handleOffer-ERR', String(e)); }
  }

  async function handleAnswer(remoteUid, data) {
    if (data.ts && (Date.now()-data.ts>90000 || data.ts<SESSION_START-5000)) return;
    const p=peers[remoteUid];
    if (!p||p.pc.signalingState==='stable') return;
    try { await p.pc.setRemoteDescription(new RTCSessionDescription(data)); dbg('answer-applied',remoteUid.slice(0,6)); }
    catch(e) { dbg('handleAnswer-ERR', String(e)); }
  }

  function dropPeer(uid) {
    const p=peers[uid];
    if (p) {
      if (p.disconnectTimer) clearTimeout(p.disconnectTimer);
      try{p.pc.close();}catch(_){}
      delete peers[uid];
    }
    const audio = $('audio-'+uid);
    if (audio) audio.remove();
    dbg('dropPeer', uid.slice(0,6));
    updateTalkBtn(); // re-check connecting state after peer drops
  }

  // ── Presence ──────────────────────────────────────────────────────────────
  presence[myUid] = {name:myName, speaking:false};
  await Promise.all([
    fbDel(room,'signals/'+myUid),
    fbDel(room,'ice/'+myUid),
    fbDel(room,'talking/'+myUid),
  ]).catch(()=>{});

  fbPut(room,'users/'+myUid, {name:myName,ts:Date.now(),sid:SESSION_START}).then(()=>{
    dbg('registered-ok','bootstrap fetch');
    fetch(fbUrl(room,'users')).then(r=>r.json()).then(data=>{
      if(data){ dbg('bootstrap-users', Object.keys(data).length+''); onUsers('/',data); }
    }).catch(()=>{});
    fetch(fbUrl(room,'signals/'+myUid)).then(r=>r.json()).then(data=>{
      if(data){ dbg('bootstrap-signals',''); onSignals('/',data); }
    }).catch(()=>{});
  }).catch(()=>{});

  function onLeave() {
    fetch(fbUrl(room,'users/'+myUid),   {method:'DELETE',keepalive:true});
    fetch(fbUrl(room,'talking/'+myUid), {method:'DELETE',keepalive:true});
  }
  window.addEventListener('beforeunload', onLeave);
  window.addEventListener('pagehide',     onLeave);

  const doHeartbeat = () => fbPut(room,'users/'+myUid, {name:myName,ts:Date.now(),sid:SESSION_START});
  setInterval(doHeartbeat, 8000);

  // Stale peer cleanup
  setInterval(() => {
    const now=Date.now();
    Object.keys(lastSeen).forEach(uid=>{
      if (now-lastSeen[uid]>28000) {
        fbDel(room,'users/'+uid); fbDel(room,'talking/'+uid);
        if (presence[uid]) presence[uid].speaking=false;
        delete presence[uid]; delete peerSids[uid]; delete lastSeen[uid];
        dropPeer(uid);
        renderList(); updateTalkBtn();
      }
    });
  }, 8000);

  // ── Firebase listeners ────────────────────────────────────────────────────
  function onUsers(path, data) {
    const proc=(uid,d)=>{
      if (uid===myUid) return;
      if (!d||!d.name) {
        if (presence[uid]) presence[uid].speaking=false;
        delete presence[uid]; delete peerSids[uid]; dropPeer(uid);
        renderList(); updateTalkBtn(); return;
      }
      const isStale    = d.sid && peerSids[uid] && d.sid < peerSids[uid];
      if (isStale) { dbg('stale-ignored',uid.slice(0,6)); return; }
      const sidChanged = d.sid && peerSids[uid] && d.sid > peerSids[uid];
      if (sidChanged) { dropPeer(uid); delete presence[uid]; }
      if (d.sid) peerSids[uid]=d.sid;
      lastSeen[uid]=Date.now();

      if (!presence[uid]) {
        presence[uid]={name:d.name,speaking:false};
        renderList(); updateTalkBtn();
        if (myUid<uid) sendOffer(uid);
      } else {
        presence[uid].name=d.name;
        renderList();
        if (myUid<uid) {
          if (!peers[uid]) { sendOffer(uid); }
          else {
            const age=Date.now()-(peers[uid].offerSentAt||0);
            if (peers[uid].pc.signalingState==='have-local-offer' && age>25000) {
              dropPeer(uid); presence[uid]={name:d.name,speaking:false}; sendOffer(uid);
            }
          }
        }
      }
    };
    if (path==='/') { if(data) Object.entries(data).forEach(([uid,d])=>proc(uid,d)); }
    else proc(path.slice(1),data);
  }

  function onSignals(path, data) {
    const proc=(fromUid,sig)=>{
      if(!sig) return;
      if (sig.type==='offer')  handleOffer(fromUid,sig);
      if (sig.type==='answer') handleAnswer(fromUid,sig);
    };
    if (path==='/') { if(data) Object.entries(data).forEach(([uid,s])=>proc(uid,s)); }
    else proc(path.slice(1),data);
  }

  fbListen(room, 'users',          onUsers,   {pollMs:15000});
  fbListen(room, 'signals/'+myUid, onSignals, {pollMs:10000});

  fbListen(room, 'talking', (path, data) => {
    if (path === '/') {
      // Full snapshot — reset remote speaking states first
      Object.keys(presence).forEach(uid => {
        if (uid !== myUid && presence[uid]) presence[uid].speaking = false;
      });
      if (data) Object.entries(data).forEach(([uid, val]) => {
        if (uid !== myUid && presence[uid]) presence[uid].speaking = !!val;
      });
    } else {
      const uid = path.slice(1);
      if (uid !== myUid && presence[uid]) presence[uid].speaking = !!data;
    }
    renderList();
    updateTalkBtn();
  }, {pollMs:5000});

  // ── Visibility recovery ───────────────────────────────────────────────────
  document.addEventListener('visibilitychange', async () => {
    if (document.visibilityState !== 'visible') return;
    doHeartbeat(); setTimeout(doHeartbeat, 3000);
    document.querySelectorAll('audio').forEach(a => {
      if (a.srcObject && a.paused) a.play().catch(()=>{});
    });
    for (const [uid, {pc}] of Object.entries(peers)) {
      if ((pc.connectionState==='failed'||pc.connectionState==='disconnected')
          && pc.signalingState==='stable' && myUid<uid) {
        try {
          const o=await pc.createOffer({iceRestart:true}); await pc.setLocalDescription(o);
          fbPut(room,'signals/'+uid+'/'+myUid, {type:'offer',sdp:o.sdp,ts:Date.now()});
        } catch(e){}
      }
    }
  });

  // Initial render
  renderList();
  updateTalkBtn();
  dbg('app-started','uid='+myUid.slice(0,6)+' room='+room);
}
</script>
</body>
</html>
